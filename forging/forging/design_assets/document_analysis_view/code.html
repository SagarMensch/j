<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Document Analysis View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2109aa",
                        "background-light": "#f6f5f8",
                        "background-dark": "#131022",
                        "surface": "#F4F6F8",
                        "text-main": "#121212",
                        "muted": "#737373",
                        "border-color": "#E5E5E5",
                        "accent-red": "#EE2A24",
                        "accent-amber": "#FFC80A",
                        "accent-green": "#00823B",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    boxShadow: {
                        'subtle': '0 4px 20px rgba(0,0,0,0.04)',
                        'panel': '-4px 0 24px rgba(0,0,0,0.06)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFFFF;
            color: #121212;
            margin: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-white">
<!-- Top Navigation (Shared Component Logic: Excluded for focused analysis view, using simple back header) -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-color bg-primary text-white px-6 py-4 flex-shrink-0 h-20">
<div class="flex items-center gap-6">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white text-2xl">arrow_back</span>
</button>
<div>
<h1 class="text-xl font-bold leading-tight">INV-2023-8942</h1>
<p class="text-sm font-medium text-white/80">Passport_Scan_Front.jpg</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="px-3 py-1 bg-accent-red text-white text-sm font-bold rounded-full">Tampering Detected</span>
<button class="bg-white text-primary px-6 py-2 rounded-full font-bold text-sm hover:bg-gray-100 transition-colors shadow-sm">
                Generate Report
            </button>
</div>
</header>
<!-- Main Workspace: Split Pane -->
<main class="flex flex-1 overflow-hidden">
<!-- Left: Document Canvas (60%) -->
<section class="w-[60%] h-full relative bg-white flex items-center justify-center overflow-hidden">
<!-- Document Image Placeholder -->
<div class="w-full h-full p-8 flex items-center justify-center">
<div class="relative max-w-full max-h-full shadow-lg border border-border-color rounded-lg overflow-hidden">
<img alt="Document Scan" class="object-contain max-h-[819px] w-auto" data-alt="high resolution scan of a formal identification document with geometric security patterns on a stark white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtczp0zv04hONSnOhrbuyweroVREBqDjrbmyL4yjgo2VkwR6nGBKvL-riw4ZVri18LwV3d-MbG4m_85Fy0EET9F0cQt7aQFjPZZFcANiu4Qccyf-YSGMyl7VcaPSaRLTdb7giyE2dCS8CwfE-A-KHkBhs6fZHXhGMzwAwGWIzV9kuWBxiVpysDNqrRzdeXVn67fGFrBT86LtxGODd7Jggq4qQhaNZdF4V_QWyBhpBgOpgAteR7NTdeoG5y2Ev1VZC0qUxyWJI2rms"/>
<!-- Simulated Heatmap Overlay (Hidden by default, shown for context) -->
<div class="absolute inset-0 bg-red-500/20 mix-blend-multiply pointer-events-none border-4 border-accent-red hidden"></div>
<!-- Target box for anomaly -->
<div class="absolute top-[40%] right-[20%] w-32 h-16 border-2 border-accent-red bg-accent-red/10 rounded"></div>
</div>
</div>
<!-- Floating Control Pill -->
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-surface p-2 rounded-full shadow-subtle border border-border-color">
<button class="p-2 rounded-full hover:bg-white text-text-main transition-colors flex items-center justify-center" title="Zoom Out">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<span class="text-sm font-bold w-12 text-center select-none">100%</span>
<button class="p-2 rounded-full hover:bg-white text-text-main transition-colors flex items-center justify-center" title="Zoom In">
<span class="material-symbols-outlined text-xl">add</span>
</button>
<div class="w-px h-6 bg-border-color mx-1"></div>
<button class="p-2 rounded-full hover:bg-white text-text-main transition-colors flex items-center justify-center" title="Pan Tool">
<span class="material-symbols-outlined text-xl">pan_tool</span>
</button>
<button class="p-2 rounded-full hover:bg-white text-text-main transition-colors flex items-center justify-center" title="Reset View">
<span class="material-symbols-outlined text-xl">fit_screen</span>
</button>
</div>
</section>
<!-- Right: Contextual Analysis Panel (40%) -->
<section class="w-[40%] h-full bg-surface border-l border-border-color shadow-panel flex flex-col z-10">
<!-- Shared Component: TopNavBar Tabs (Adapted for this context as requested by strict logic, keeping literal HTML structure but adapted to panel width) -->
<div class="pb-0 bg-white border-b border-border-color flex-shrink-0">
<div class="flex px-4 gap-8">
<a class="flex flex-col items-center justify-center border-b-[4px] border-b-primary text-text-main pb-[13px] pt-4" href="#">
<p class="text-text-main text-sm font-bold leading-normal tracking-[0.015em]">Status</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[4px] border-b-transparent text-muted pb-[13px] pt-4 hover:text-text-main transition-colors" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Evidence</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[4px] border-b-transparent text-muted pb-[13px] pt-4 hover:text-text-main transition-colors" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Diagnostics</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[4px] border-b-transparent text-muted pb-[13px] pt-4 hover:text-text-main transition-colors" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Timeline</p>
</a>
</div>
</div>
<!-- Panel Content Area -->
<div class="flex-1 overflow-y-auto p-6 bg-surface">
<div class="mb-6 flex items-center justify-between">
<h2 class="text-xl font-bold text-text-main">Integrity Checks</h2>
<span class="text-sm font-medium text-muted">4 Checks Completed</span>
</div>
<!-- Findings Status List (TfL Line Status Style) -->
<div class="flex flex-col gap-3">
<!-- Critical Check -->
<button class="w-full bg-white border border-border-color rounded-xl h-16 flex items-center overflow-hidden hover:bg-gray-50 transition-colors shadow-sm group">
<div class="w-2 h-full bg-accent-red flex-shrink-0"></div>
<div class="flex-1 px-4 flex items-center justify-between">
<div class="flex flex-col items-start">
<span class="font-bold text-text-main text-base">Pixel Tampering</span>
<span class="text-xs font-medium text-accent-red">Clone-stamp detected</span>
</div>
<span class="material-symbols-outlined text-muted group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
<!-- Warning Check -->
<button class="w-full bg-white border border-border-color rounded-xl h-16 flex items-center overflow-hidden hover:bg-gray-50 transition-colors shadow-sm group">
<div class="w-2 h-full bg-accent-amber flex-shrink-0"></div>
<div class="flex-1 px-4 flex items-center justify-between">
<div class="flex flex-col items-start">
<span class="font-bold text-text-main text-base">Metadata Integrity</span>
<span class="text-xs font-medium text-accent-amber">Inconsistent EXIF dates</span>
</div>
<span class="material-symbols-outlined text-muted group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
<!-- Good Check 1 -->
<button class="w-full bg-white border border-border-color rounded-xl h-16 flex items-center overflow-hidden hover:bg-gray-50 transition-colors shadow-sm group">
<div class="w-2 h-full bg-accent-green flex-shrink-0"></div>
<div class="flex-1 px-4 flex items-center justify-between">
<div class="flex flex-col items-start">
<span class="font-bold text-text-main text-base">OCR Text Extraction</span>
<span class="text-xs font-medium text-muted">Clear</span>
</div>
<span class="material-symbols-outlined text-muted group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
<!-- Good Check 2 -->
<button class="w-full bg-white border border-border-color rounded-xl h-16 flex items-center overflow-hidden hover:bg-gray-50 transition-colors shadow-sm group">
<div class="w-2 h-full bg-accent-green flex-shrink-0"></div>
<div class="flex-1 px-4 flex items-center justify-between">
<div class="flex flex-col items-start">
<span class="font-bold text-text-main text-base">Signature Verification</span>
<span class="text-xs font-medium text-muted">Clear</span>
</div>
<span class="material-symbols-outlined text-muted group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
</div>
</div>
</section>
</main>
</body></html>
